[tox]
requires =
    tox>=4.22
    tox-uv>=1.13
env_list = 
    py39,
    lint
# 3.9 is currently the only environment with working torch/braindecode wheels.
# py310+ envs can be added here once the deferred Python migration lands.
skip_missing_interpreters = true

[testenv]
description = run the eeg_win_stack test suite
# uv-venv-runner builds the env with uv (fast, shared cache) resolving from
# pyproject.toml. We avoid the lock runner because uv.lock is gitignored, so
# `uv sync --locked` is not portable to a fresh clone / CI.
runner = uv-venv-runner
dependency_groups = dev
commands =
    pytest {posargs:eeg_win_stack/tests}

[testenv:lint]
description = ruff lint + format checks
runner = uv-venv-runner
# lint only needs ruff, so skip installing the project and its heavy deps.
skip_install = true
dependency_groups =
deps = ruff>=0.15.14
commands =
    ruff check {posargs:eeg_win_stack}
    ruff format --check {posargs:eeg_win_stack}
