[run]
mne_log_level = "WARNING"
n_repetitions = 1
random_state = 87
n_jobs = 8

[data]
tuab = true
tueg = true
n_tuab = 2993
n_tueg = 50
n_load = 100
preload = true
tuab_path = "/home/sam/Code/EEGScopeAndArbitration/data/TUAB"
tueg_path = "/home/sam/Code/EEGScopeAndArbitration/data/TUEG"
save_recordings = false
save_recordings_path = "/home/sam/Code/EEGScopeAndArbitration/data/output"
save_windows = false
save_windows_path = "/home/sam/Code/EEGScopeAndArbitration/data/output/saved_windows"
load_saved_recordings = false
load_saved_windows = false
relabel_datasets = ["/home/sam/Code/EEGScopeAndArbitration/data/TUEG"]
relabel_labels = ["/home/sam/Code/EEGScopeAndArbitration/data/autoTUAB/autoTUAB_labels.csv"]

[preprocessing]
bandpass_filter = false
low_cut_hz = 4.0
high_cut_hz = 38.0
standardization = true
factor_new = 1e-3
init_block_size = 1000
max_abs_val = 800
sampling_freq = 100

[windowing]
window_len_s = 60
tmin = 300
sec_to_cut = 60
duration_recording_sec = 1200
# window_stride_samples omitted — defaults to window_len_samples when absent
# tmax omitted — defaults to None (use full recording) when absent
channels = [
    "EEG FP1-REF", "EEG FP2-REF", "EEG F3-REF", "EEG F4-REF", "EEG C3-REF",
    "EEG C4-REF", "EEG P3-REF", "EEG P4-REF", "EEG O1-REF", "EEG O2-REF",
    "EEG F7-REF", "EEG F8-REF", "EEG T3-REF", "EEG T4-REF", "EEG T5-REF",
    "EEG T6-REF", "EEG FZ-REF", "EEG PZ-REF", "EEG CZ-REF",
]

[split]
split_way = "train_on_tuab_tueg_test_on_tueg"
train_size = 0.8
valid_size = 0.1
test_size = 0.1
shuffle = true

[training]
learning_rate = 0.001
weight_decay = 0.0005
batch_size = 1
n_epochs = 30
n_classes = 2
test_on_eval = true
earlystopping = true
es_patience = 10
es_threshold = 0.001
checkpoint_dir = ""

[output]
log_path = "./data/target/result.csv"
saved_models_path = "./data/saved_models/"
plot_result = false
train_whole_dataset_again = true
load_pretrained_model = false

[model]
name = "deep4"
final_conv_length = "auto"
dropout = 0.1

[model.deep4]
activation = "elu"
batch_norm_alpha = 0.1
n_filters_time = 25
n_filters_spat = 25
filter_time_length = 10
pool_time_length = 3
pool_time_stride = 3
n_filters_2 = 50
filter_length_2 = 10
n_filters_3 = 100
filter_length_3 = 10
n_filters_4 = 200
filter_length_4 = 10
first_pool_mode = "max"
later_pool_mode = "max"
double_time_convs = false
split_first_layer = true
batch_norm = true
stride_before_pool = false

[model.tcn]
kernel_size = 11
n_blocks = 5
n_filters = 55
add_log_softmax = true
last_layer_type = "max_pool"
dropout = 0.05270154233150525

[model.shallow]
n_filters_time = 40
filter_time_length = 25
n_filters_spat = 40
pool_time_length = 75
pool_time_stride = 15
split_first_layer = true
batch_norm = true
batch_norm_alpha = 0.1

[model.vit]
patch_size = 10
dim = 64
depth = 6
heads = 16
mlp_dim = 64
emb_dropout = 0.1
